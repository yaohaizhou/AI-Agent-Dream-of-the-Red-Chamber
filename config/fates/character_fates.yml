# 红楼梦人物命运轨迹配置
# 基于原著第五回判词设计
# 适配结局：宝玉和黛玉终成眷属，贾府中兴

林黛玉:
  判词: "可叹停机德，堪怜咏絮才。玉带林中挂，金簪雪里埋。"
  判词解读: |
    原判词预示黛玉泪尽而亡、宝钗独守空房。
    本改编结局中，设计"假死-重生"转折，
    让黛玉经历生死考验后与宝玉重逢，
    既保留判词的悲剧美感，又实现圆满结局。
  
  命运轨迹:
    阶段1_病中情深:
      章节范围: 81-90
      主题: 病情反复，爱情深化
      情感基调: 哀而不伤
      关键事件:
        - 第81回: 秋日感怀，作诗抒怀
        - 第83回: 咳血加重，宝玉日夜守护
        - 第85回: 得知金玉良缘风声，决意坚强
        - 第88回: 与宝玉私下盟誓
      人物状态:
        身体状况: 虚弱但精神坚韧
        心理状态: 从悲观转为抗争
        与宝玉关系: 情感升温，互诉衷肠
    
    阶段2_生死考验:
      章节范围: 91-100
      主题: 假死设计，逃离贾府
      情感基调: 大悲大痛转希望
      关键事件:
        - 第92回: 宝玉宝钗婚礼筹备，黛玉病重
        - 第95回: 设计"病逝"假象，紫鹃配合
        - 第96回: 深夜由袭人帮助离开贾府
        - 第98回: 寄居郊外庵堂，静待时机
        - 第99回: 得知宝玉逃婚寻找自己
      人物状态:
        身体状况: 养病中逐渐好转
        心理状态: 思念宝玉，但坚信重逢
        与宝玉关系: 被迫分离，心意不改
    
    阶段3_真相大白:
      章节范围: 101-110
      主题: 峰回路转，真相揭晓
      情感基调: 悲喜交加
      关键事件:
        - 第102回: 宝黛意外重逢于水月庵
        - 第104回: 贾母得知真相，心疼不已
        - 第106回: 贾府接纳黛玉回归
        - 第108回: 宝黛正式订下婚约
      人物状态:
        身体状况: 逐渐康复
        心理状态: 重获希望，写诗庆祝
        与宝玉关系: 历经磨难，更加珍惜
    
    阶段4_圆满结局:
      章节范围: 111-120
      主题: 终成眷属，白头偕老
      情感基调: 温馨圆满
      关键事件:
        - 第112回: 宝黛大婚，贾府喜庆
        - 第115回: 黛玉有孕，家族欢庆
        - 第118回: 诞下麟儿，取名贾芹
        - 第120回: 宝玉黛玉携手观园，回顾往昔
      人物状态:
        身体状况: 康健
        心理状态: 幸福满足
        与宝玉关系: 夫妻恩爱，相敬如宾
  
  关键转折点:
    - 章节: 85
      事件: 得知金玉良缘风声
      影响: 黛玉决定不再自怨自艾，要争取幸福
    - 章节: 95
      事件: 假死出府
      影响: 保护宝玉不被迫成婚，保全自己
    - 章节: 102
      事件: 与宝玉重逢
      影响: 感情升华，得到贾府认可

贾宝玉:
  判词: "假作真时真亦假，无为有处有还无。"
  判词解读: |
    原判词预示宝玉最终看破红尘出家。
    本改编结局中，让宝玉经历失去黛玉的痛苦后，
    更加珍惜真情，选择留在红尘守护爱情，
    实现判词中"真假"的哲学升华。
  
  命运轨迹:
    阶段1_抗争期:
      章节范围: 81-90
      主题: 反抗封建礼教，守护黛玉
      关键事件:
        - 第82回: 被贾政逼迫读书科举
        - 第85回: 得知要娶宝钗，坚决反抗
        - 第88回: 与黛玉私下盟誓，非卿不娶
    
    阶段2_失去期:
      章节范围: 91-100
      主题: 误以为黛玉病逝，精神崩溃
      关键事件:
        - 第92回: 被迫与宝钗成婚，逃婚出走
        - 第95回: 得知黛玉"死讯"，疯癫三日
        - 第98回: 独自寻找黛玉踪迹
        - 第99回: 在水月庵意外重逢
    
    阶段3_重逢期:
      章节范围: 101-110
      主题: 真相大白，争取婚姻自主
      关键事件:
        - 第102回: 与黛玉重逢，悲喜交加
        - 第105回: 向贾母求情，坚决要娶黛玉
        - 第108回: 获得贾府认可，与黛玉订婚
    
    阶段4_圆满期:
      章节范围: 111-120
      主题: 成家立业，守护爱情
      关键事件:
        - 第112回: 与黛玉大婚
        - 第116回: 中举入仕，改变家族看法
        - 第120回: 与黛玉携手观园，感悟人生
  
  关键转折点:
    - 章节: 92
      事件: 逃婚出走
      影响: 表明反抗封建婚姻的决心
    - 章节: 95
      事件: 得知黛玉"死讯"
      影响: 精神崩溃，更加珍惜真情
    - 章节: 102
      事件: 与黛玉重逢
      影响: 重获新生，坚定守护爱情

薛宝钗:
  判词: "可叹停机德，堪怜咏絮才。玉带林中挂，金簪雪里埋。"
  判词解读: |
    原判词预示宝钗独守空房。
    本改编结局中，让宝钗经历婚姻失败后，
    重新找到人生价值，另择良配，
    体现其圆滑世故中的智慧与重生。
  
  命运轨迹:
    阶段1_期待期:
      章节范围: 81-90
      主题: 金玉良缘渐成，内心期待
      关键事件:
        - 第85回: 得知贾母有意撮合
        - 第88回: 劝说宝玉读书，被拒
    
    阶段2_幻灭期:
      章节范围: 91-100
      主题: 成婚但宝玉心系黛玉
      关键事件:
        - 第92回: 与宝玉成婚，但宝玉逃婚
        - 第95回: 宝玉得知黛玉"死讯"后疯癫
        - 第99回: 意识到宝玉心中只有黛玉
    
    阶段3_觉醒期:
      章节范围: 101-110
      主题: 主动退出，成全宝黛
      关键事件:
        - 第103回: 主动提出与宝玉和离
        - 第106回: 得到贾府谅解
        - 第108回: 搬出大观园，独居薛家
    
    阶段4_重生期:
      章节范围: 111-120
      主题: 另择良配，获得幸福
      关键事件:
        - 第113回: 经薛姨妈介绍，结识新婿
        - 第116回: 再嫁，夫家显赫
        - 第120回: 与宝黛夫妇和解，三家和睦
  
  关键转折点:
    - 章节: 99
      事件: 意识到宝玉真爱是黛玉
      影响: 决定成全，展现大度
    - 章节: 103
      事件: 主动提出和离
      影响: 解放宝玉，也解放自己

王熙凤:
  判词: "凡鸟偏从末世来，都知爱慕此生才。一从二令三人木，哭向金陵事更哀。"
  判词解读: |
    原判词预示凤姐被休，病逝金陵。
    本改编结局中，让凤姐经历权势丧失后，
    凭借才干帮助贾府中兴，重获尊重，
    体现其才干与重生。
  
  命运轨迹:
    阶段1_权势巅峰:
      章节范围: 81-90
      主题: 掌握贾府大权，树敌众多
      关键事件:
        - 第83回: 设计帮助宝玉黛玉相会
        - 第87回: 因放高利贷被告发，开始失势
    
    阶段2_失势期:
      章节范围: 91-100
      主题: 贾琏休妻，众叛亲离
      关键事件:
        - 第93回: 贾琏以无子为由休妻
        - 第96回: 被逐出贾府，回到王家
        - 第99回: 痛定思痛，决心改过
    
    阶段3_重生期:
      章节范围: 101-110
      主题: 凭借才干，帮助贾府中兴
      关键事件:
        - 第104回: 贾母念旧，请回凤姐协理家务
        - 第107回: 帮助贾府整顿家业，开源节流
        - 第109回: 与贾琏复婚，重归于好
    
    阶段4_善终期:
      章节范围: 111-120
      主题: 功成名就，安享晚年
      关键事件:
        - 第114回: 生下儿子，母凭子贵
        - 第120回: 成为贾府最受尊敬的当家主母
  
  关键转折点:
    - 章节: 93
      事件: 被贾琏休妻
      影响: 人生低谷，开始反思
    - 章节: 104
      事件: 被请回贾府
      影响: 重获机会，大显身手

贾母:
  判词: 无（原著未明确）
  命运轨迹:
    阶段1_担忧期:
      章节范围: 81-90
      主题: 担忧宝玉前程，考虑金玉良缘
    
    阶段2_悲痛期:
      章节范围: 91-100
      主题: 黛玉"病逝"，宝玉疯癫，悲痛欲绝
    
    阶段3_欣慰期:
      章节范围: 101-110
      主题: 得知真相，欣慰宝黛情深，接纳黛玉
    
    阶段4_圆满期:
      章节范围: 111-120
      主题: 见证宝黛大婚，四世同堂，含笑九泉
  
  关键转折点:
    - 章节: 102
      事件: 得知黛玉未死真相
      影响: 心疼黛玉，同意宝黛婚事
